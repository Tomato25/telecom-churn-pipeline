version: 2

models:
  - name: stg_customers
    description: "Cleaned and typed customer data from raw telecom source."
    columns:
      - name: customer_id
        description: "Unique customer identifier"
        tests:
          - unique
          - not_null

      - name: gender
        description: "Customer gender, lowercased"
        tests:
          - accepted_values:
              name: accepted_gender_values
              arguments:
                values: ['male', 'female']

      - name: contract_type
        description: "Type of customer contract"
        tests:
          - accepted_values:
              name: accepted_contract_values
              arguments:
                values: ['Month-to-month', 'One year', 'Two year']

      - name: has_churned
        description: "Whether the customer has cancelled their subscription"
        tests:
          - not_null